apiVersion: sourceplane.io/v1
kind: Intent

metadata:
  name: microservices-deployment
  description: Example multi-environment microservices deployment
  namespace: default

compositions:
  sources:
    - name: platform-core
      kind: dir
      path: ../packages/platform-core

discovery:
  roots:
    - ../services/
    - ../infra/
    - ../deploy/

groups:
  platform:
    policies:
      environment: production-only
      isolation: strict
    defaults:
      namespacePrefix: platform-
      owner: platform-team

  onboarding:
    policies:
      approval: required
    defaults:
      owner: onboarding-team
      timeout: 30m

environments:
  production:
    selectors:
      domains:
        - "platform"
    defaults:
      region: us-west-2
      replicas: 3
      logLevel: info
    policies:
      requireApproval: "true"

  staging:
    selectors:
      domains:
        - "platform"
    defaults:
      region: us-west-2
      replicas: 1
      logLevel: debug
    policies:
      requireApproval: "false"

  development:
    defaults:
      region: us-east-1
      replicas: 1
      logLevel: debug
    policies:
      requireApproval: "false"

components:
  - name: component-charts
    type: charts
    domain: platform
    enabled: true
    subscribe:
      environments:
        - development
        - staging
        - production
    inputs:
      registry: mycompany.azurecr.io/helm/charts
      pullPolicy: Always
    labels:
      team: platform
      tier: utility
    dependsOn:
      - component: common-services
        environment: ""
        scope: same-environment
        condition: success
