$schema: http://json-schema.org/draft-07/schema#
title: orun Intent
description: Policy-aware deployment intent specification
type: object
required:
  - apiVersion
  - kind
  - metadata
properties:
  apiVersion:
    type: string
    pattern: ^sourceplane\.io/v[0-9]+$
  kind:
    type: string
    enum:
      - Intent
  metadata:
    type: object
    required:
      - name
    properties:
      name:
        type: string
        minLength: 1
        maxLength: 63
        pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
      description:
        type: string
      namespace:
        type: string
        default: default
  extends:
    type: array
    description: List of intent presets to inherit from composition sources.
    items:
      type: object
      required:
        - source
        - preset
      properties:
        source:
          type: string
          description: Name of a declared composition source.
          minLength: 1
        preset:
          type: string
          description: Name of the preset within that source's stack.
          minLength: 1
      additionalProperties: false
  discovery:
    type: object
    properties:
      roots:
        type: array
        description: Optional directories to recursively scan for component.yaml files relative to the intent file.
        items:
          type: string
  compositions:
    type: object
    properties:
      sources:
        type: array
        items:
          type: object
          required:
            - name
            - kind
          properties:
            name:
              type: string
              minLength: 1
            kind:
              type: string
              enum:
                - dir
                - archive
                - oci
            path:
              type: string
            ref:
              type: string
            digest:
              type: string
            pullPolicy:
              type: string
            metadata:
              type: object
              additionalProperties:
                type: string
      resolution:
        type: object
        properties:
          precedence:
            type: array
            items:
              type: string
          bindings:
            type: object
            additionalProperties:
              type: string
  groups:
    type: object
    additionalProperties:
      type: object
      properties:
        policies:
          type: object
          additionalProperties: true
        defaults:
          type: object
          description: Default properties for components in this group (supports template variables)
          additionalProperties: true
  environments:
    type: object
    additionalProperties:
      type: object
      properties:
        activation:
          type: object
          properties:
            triggerRefs:
              type: array
              description: Names of trigger bindings that activate this environment.
              items:
                type: string
                minLength: 1
          additionalProperties: false
        promotion:
          type: object
          description: Environment promotion dependencies for ordering/gating between environments.
          properties:
            dependsOn:
              type: array
              items:
                type: object
                required:
                  - environment
                properties:
                  environment:
                    type: string
                    minLength: 1
                    description: Name of the environment that must succeed before this one.
                  strategy:
                    type: string
                    enum:
                      - same-component
                      - environment-barrier
                    default: same-component
                    description: How to map dependencies. same-component links matching components; environment-barrier waits for all jobs.
                  condition:
                    type: string
                    enum:
                      - success
                    default: success
                  satisfy:
                    type: string
                    enum:
                      - same-plan
                      - previous-success
                      - same-plan-or-previous-success
                    default: same-plan-or-previous-success
                    description: Whether to use in-plan DAG edges, prior evidence, or both.
                  match:
                    type: object
                    properties:
                      revision:
                        type: string
                        enum:
                          - source
                        description: How to match prior success evidence (source = same commit).
                    additionalProperties: false
          additionalProperties: false
        selectors:
          type: object
          properties:
            components:
              type: array
              items:
                type: string
            domains:
              type: array
              items:
                type: string
        defaults:
          type: object
          description: Default properties for components in this environment (supports template variables)
          additionalProperties: true
        policies:
          type: object
          additionalProperties: true
  automation:
    type: object
    description: Trigger binding declarations for CI/event-driven planning.
    properties:
      triggerBindings:
        type: object
        description: Named trigger bindings that map provider events to environment activation.
        additionalProperties:
          type: object
          required:
            - on
          properties:
            description:
              type: string
            on:
              type: object
              required:
                - provider
                - event
              properties:
                provider:
                  type: string
                  description: Event provider (e.g. github).
                  minLength: 1
                event:
                  type: string
                  description: Normalized event name (e.g. push, pull_request).
                  minLength: 1
                actions:
                  type: array
                  description: Optional event action filter.
                  items:
                    type: string
                branches:
                  type: array
                  description: Optional source/ref branch filter (supports globs).
                  items:
                    type: string
                baseBranches:
                  type: array
                  description: Optional PR base branch filter (supports globs).
                  items:
                    type: string
                tags:
                  type: array
                  description: Optional tag filter (supports globs).
                  items:
                    type: string
              additionalProperties: false
            plan:
              type: object
              properties:
                scope:
                  type: string
                  description: Plan scope when this trigger fires.
                  enum:
                    - full
                    - changed
                base:
                  type: string
                  description: Dot-path into the raw event payload for the base revision.
                head:
                  type: string
                  description: Dot-path into the raw event payload for the head revision.
              additionalProperties: false
    additionalProperties: false
  execution:
    type: object
    description: Optional execution-layer configuration (remote state, etc.)
    properties:
      state:
        type: object
        description: Controls where execution state is stored.
        properties:
          mode:
            type: string
            description: State storage mode. "local" uses the filesystem (default); "remote" uses orun-backend.
            enum:
              - local
              - remote
          backendUrl:
            type: string
            description: URL of the orun-backend instance (required when mode is remote).
            format: uri
        additionalProperties: false
    additionalProperties: false
  components:
    type: array
    items:
      type: object
      required:
        - name
        - type
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 63
        type:
          type: string
          minLength: 1
        domain:
          type: string
        enabled:
          type: boolean
          default: true
        path:
          type: string
          description: Working directory path for component execution (highest priority in override hierarchy, supports template variables)
        subscribe:
          type: object
          properties:
            environments:
              type: array
              items:
                type: string
        compositionRef:
          type: object
          properties:
            source:
              type: string
            name:
              type: string
        inputs:
          type: object
          additionalProperties: true
        overrides:
          type: object
          properties:
            steps:
              type: array
              items:
                type: object
                required:
                  - name
                  - run
                properties:
                  name:
                    type: string
                    minLength: 1
                  phase:
                    type: string
                    enum:
                      - pre
                      - main
                      - post
                    default: main
                  order:
                    type: integer
                    minimum: 0
                  run:
                    type: string
                    minLength: 1
                  timeout:
                    type: string
                    pattern: ^[0-9]+(m|h|s)$
                  retry:
                    type: integer
                    minimum: 0
                    maximum: 10
                  onFailure:
                    type: string
                    enum:
                      - stop
                      - continue
        labels:
          type: object
          additionalProperties:
            type: string
        dependsOn:
          type: array
          items:
            type: object
            required:
              - component
            properties:
              component:
                type: string
              environment:
                type: string
              scope:
                type: string
                enum:
                  - same-environment
                  - cross-environment
              condition:
                type: string
                enum:
                  - success
                  - always
                  - failure
