apiVersion: sourceplane.io/v1
kind: Intent

metadata:
  name: multi-environment-platform
  description: Multi-environment DevOps sample for foundation, identity, and commerce domains
  namespace: default

compositions:
  sources:
    - name: example-platform
      kind: dir
      path: ./compositions

discovery:
  roots:
    - apps/
    - infra/
    - deploy/
    - charts/
    - packages/
    - website/

automation:
  triggerBindings:
    github-pull-request:
      description: Pull request validation
      on:
        provider: github
        event: pull_request
        actions:
          - opened
          - synchronize
          - reopened
          - ready_for_review
        baseBranches:
          - main
      plan:
        scope: changed
        base: pull_request.base.sha
        head: pull_request.head.sha

    github-push-main:
      description: Main branch verification after merge
      on:
        provider: github
        event: push
        branches:
          - main
      plan:
        scope: changed
        base: before
        head: after

    github-tag-release:
      description: Release tag planning
      on:
        provider: github
        event: push
        tags:
          - "v*"
      plan:
        scope: full

environments:
  dev:
    activation:
      triggerRefs:
        - github-pull-request
    parameterDefaults:
      "*":
        lane: dry-run
        namespacePrefix: dev-
    policies:
      requireApproval: "false"

  development:
    activation:
      triggerRefs:
        - github-pull-request
    parameterDefaults:
      "*":
        lane: dry-run
        namespacePrefix: dev-
    policies:
      requireApproval: "false"

  preview:
    activation:
      triggerRefs:
        - github-pull-request
    parameterDefaults:
      "*":
        lane: verify
        namespacePrefix: preview-
    policies:
      requireApproval: "false"

  staging:
    activation:
      triggerRefs:
        - github-push-main
    parameterDefaults:
      "*":
        lane: verify
        namespacePrefix: stg-
    policies:
      requireApproval: "true"

  production:
    activation:
      triggerRefs:
        - github-tag-release
    parameterDefaults:
      "*":
        lane: release
        namespacePrefix: prod-
    policies:
      requireApproval: "true"
