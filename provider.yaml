apiVersion: kiox.io/v1
kind: Provider
metadata:
  namespace: sourceplane
  name: orun
  version: v2.4.1
  description: Provider-native CI planning engine that compiles intent into deterministic execution plans
  homepage: https://github.com/sourceplane/orun
  license: MIT
spec:
  runtime: binary
  entrypoint: orun
  platforms:
    - os: darwin
      arch: amd64
      binary: bin/darwin/amd64/orun
    - os: darwin
      arch: arm64
      binary: bin/darwin/arm64/orun
    - os: linux
      arch: amd64
      binary: bin/linux/amd64/orun
    - os: linux
      arch: arm64
      binary: bin/linux/arm64/orun
  capabilities:
    plan:
      description: Generate an execution plan from an intent specification
    validate:
      description: Validate intent and component definitions
    debug:
      description: Trace intent processing and expansion stages
    run:
      description: Execute the provider runtime using generated plans
  layers:
    assets:
      root: assets