name: GitHub Artifact Demo CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  actions: write  # required for artifact upload

env:
  ORUN_ARTIFACT_BACKEND: github
  ORUN_ARTIFACT_UPLOAD: "true"

jobs:
  plan:
    name: Orun Plan
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      exec-id: ${{ steps.plan.outputs.exec_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build orun
        run: go build -o /usr/local/bin/orun ./cmd/orun

      - name: Plan with artifact upload
        id: plan
        env:
          ORUN_ARTIFACT_BACKEND: github
          ORUN_ARTIFACT_UPLOAD: "true"
        run: |
          orun plan \
            --from-ci github \
            --event-file "$GITHUB_EVENT_PATH" \
            --artifact github \
            --github-output

          # Display the plan shard was uploaded
          echo "Plan shard uploaded as: orun.v1.${EXEC_ID}.plan.*"

  run:
    name: ${{ matrix.job.name }}
    needs: plan
    if: needs.plan.outputs.matrix != '[]'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build orun
        run: go build -o /usr/local/bin/orun ./cmd/orun

      - name: Run job with artifact upload
        env:
          ORUN_EXEC_ID: ${{ needs.plan.outputs.exec_id }}
          ORUN_JOB_ID: ${{ matrix.job.id }}
          ORUN_ARTIFACT_BACKEND: github
          ORUN_ARTIFACT_UPLOAD: "true"
        run: |
          orun run \
            --from-ci github \
            --event-file "$GITHUB_EVENT_PATH" \
            --exec-id "$ORUN_EXEC_ID" \
            --job "$ORUN_JOB_ID" \
            --artifact github \
            --gha

  verify-artifacts:
    name: Verify Artifact Upload
    needs: run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build orun
        run: go build -o /usr/local/bin/orun ./cmd/orun

      - name: List uploaded artifacts
        run: |
          echo "Listing Orun artifacts for this run..."
          orun github runs --limit 1

      - name: Pull and verify artifacts
        run: |
          echo "Pulling latest Orun artifacts..."
          orun github pull --latest --orun-dir .orun/verification

          # Verify the hydrated execution exists
          if [ -d ".orun/verification/executions/" ]; then
            echo "✓ Executions directory exists"
            ls -la ".orun/verification/executions/"
          else
            echo "✗ Executions directory not found"
            exit 1
          fi

      - name: Show execution status
        run: |
          echo "Checking execution status..."
          orun status --exec-id ${{ needs.plan.outputs.exec_id }} || true
          # Also check from verification directory
          ls -la .orun/verification/executions/ 2>/dev/null || echo "No executions found"