apiVersion: sourceplane.io/v1
kind: JobRegistry
metadata:
  name: helmcommon-jobs
  description: Common services deployment jobs
jobs:
  - name: deploy
    description: Deploy common services using Helm
    runsOn: ubuntu-22.04
    timeout: 10m
    retries: 2
    labels:
      scope: deployment
      type: common-services
    steps:
      - name: add-repository
        run: helm repo add mycompany oci://mycompany.azurecr.io/helm/charts
        retry: 3
      - name: update-repo
        run: helm repo update
        retry: 2
      - name: deploy
        run: helm upgrade --install {{.orun.component.name}} {{.parameters.chart}} --namespace platform-common --create-namespace --wait=true --timeout={{.parameters.timeout}}
        timeout: 15m
        onFailure: stop
      - name: verify
        run: kubectl get deployment -n platform-common {{.orun.component.name}}
        onFailure: continue
    inputs:
      pullPolicy: IfNotPresent

  - name: health-check
    description: Health check for common services
    runsOn: ubuntu-22.04
    timeout: 5m
    retries: 1
    labels:
      scope: monitoring
      type: common-services
    steps:
      - name: pod-status
        run: kubectl get pods -n platform-common -l app={{.orun.component.name}} -o wide
        onFailure: continue
      - name: service-check
        run: kubectl get svc -n platform-common {{.orun.component.name}}
        onFailure: continue
      - name: logs
        run: kubectl logs -n platform-common -l app={{.orun.component.name}} --tail=20 || true
        onFailure: continue
    inputs:
      pullPolicy: IfNotPresent

  - name: rollback
    description: Rollback common services to previous version
    runsOn: ubuntu-22.04
    timeout: 10m
    retries: 1
    labels:
      scope: recovery
      type: common-services
    steps:
      - name: get-revision
        run: helm history {{.orun.component.name}} -n platform-common | head -2
        onFailure: stop
      - name: rollback
        run: helm rollback {{.orun.component.name}} -n platform-common
        timeout: 10m
        onFailure: stop
      - name: verify-rollback
        run: kubectl rollout status deployment/{{.orun.component.name}} -n platform-common
        onFailure: continue
    inputs:
      pullPolicy: IfNotPresent
