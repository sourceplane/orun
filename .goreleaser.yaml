version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: orun
    main: ./cmd/orun
    binary: orun
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    hooks:
      post:
        - mkdir -p dist/bin/{{ .Os }}/{{ .Arch }}
        - cp {{ .Path }} dist/bin/{{ .Os }}/{{ .Arch }}/orun
archives:
  - id: orun-archive
    ids:
      - orun
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  use: git

release:
  github:
    owner: sourceplane
    name: orun
