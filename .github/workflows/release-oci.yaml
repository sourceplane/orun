name: release-oci

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

env:
  IMAGE_REF: ghcr.io/${{ github.repository }}:${{ github.ref_name }}

jobs:
  tinx-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go tests
        run: |
          go test ./...
          cd scripts/releaser
          go test ./...

      - name: Stamp provider version
        run: |
          sed -i 's/^  version: .*/  version: ${{ github.ref_name }}/' provider.yaml

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: sourceplane/tinx-release-action@v1
        with:
          manifest: provider.yaml
          main: ./cmd/liteci
          output: oci
          dist: dist
          tag: ${{ github.ref_name }}
          push: ${{ env.IMAGE_REF }}
          delegate-goreleaser: true