name: release-oci

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  IMAGE_REF: ghcr.io/sourceplane/orun:${{ github.ref_name }}

jobs:
  kiox-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go tests
        run: go test ./...

      - name: Stamp provider version
        run: |
          sed -i 's/^  version: .*/  version: ${{ github.ref_name }}/' provider.yaml

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: sourceplane/kiox-release-action@v2.0.1
        with:
          manifest: provider.yaml
          main: ./cmd/orun
          output: oci
          dist: dist
          tag: ${{ github.ref_name }}
          push: ${{ env.IMAGE_REF }}
          kiox-version: v0.4.3
          delegate-goreleaser: true
          goreleaser-config: .goreleaser.kiox.yaml

  goreleaser-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
