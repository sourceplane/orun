apiVersion: sourceplane.io/v1alpha1
kind: Composition
metadata:
  name: workspace
spec:
  type: workspace
  description: Workspace-backed provider smoke jobs
  defaultJob: verify-workspace
  defaultProfile: full
  inputSchema:
    $schema: http://json-schema.org/draft-07/schema#
    title: Workspace Provider Smoke Component
    description: Schema for a workspace-backed provider smoke test component
    type: object
    required:
      - name
      - type
      - inputs
    properties:
      name:
        type: string
        description: Component name
      type:
        type: string
        const: workspace
        description: Component type identifier
      inputs:
        type: object
        required:
          - chartPath
          - valuesFile
          - kustomizeDir
          - terraformDir
          - workflowFile
        properties:
          AZURE_CLI_VERSION:
            type: string
            description: Exact Azure CLI version pinned for deterministic provider setup
          chartPath:
            type: string
            description: Local Helm chart path
          valuesFile:
            type: string
            description: Values file passed to helm template
          kustomizeDir:
            type: string
            description: Kustomize root used for render-only builds
          terraformDir:
            type: string
            description: Terraform directory checked with terraform fmt
          workflowFile:
            type: string
            description: Workflow file rendered by torkflow view
        additionalProperties: false
    additionalProperties: true
  executionProfiles:
    quick-check:
      description: Core provider verification only
      jobs:
        verify-workspace:
          stepsEnabled:
            - kubectl-dry-run
            - helm-template
            - terraform-fmt-check
    full:
      description: All provider smoke tests
      jobs:
        verify-workspace:
          stepsEnabled:
            - kubectl-dry-run
            - helm-template
            - terraform-fmt-check
            - kustomize-build
            - torkflow-view
  jobs:
    - name: verify-workspace
      description: Verify workspace-installed provider tools with dry-run-safe commands
      runsOn: ubuntu-22.04
      timeout: 15m
      retries: 0
      labels:
        scope: smoke
      steps:
        - id: kubectl-dry-run
          name: kubectl-dry-run
          run: kubectl version --client --output=yaml
          onFailure: stop
        - id: helm-template
          name: helm-template
          run: helm template {{.Component}} {{.chartPath}} --values {{.valuesFile}}
          onFailure: stop
        - id: terraform-fmt-check
          name: terraform-fmt-check
          run: terraform fmt -check {{.terraformDir}}
          onFailure: stop
        - id: kustomize-build
          name: kustomize-build
          run: kustomize build {{.kustomizeDir}}
          onFailure: stop
        - id: torkflow-view
          name: torkflow-view
          run: torkflow view --workflow {{.workflowFile}}
          onFailure: stop
      inputs:
        chartPath: services/hello-app
        valuesFile: services/hello-app/values.yaml
        kustomizeDir: website/smoke/kustomize
        terraformDir: website/smoke/terraform
        workflowFile: website/smoke/provider-smoke.yaml
