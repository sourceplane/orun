apiVersion: orun.io/v1
kind: Stack
metadata:
  name: tectonic
  title: Tectonic Platform Stack
  version: 1.0.0
  description: Full-lifecycle platform stack with profiles, triggers, and override policy.
  owner: sourceplane
  tags:
    - terraform
    - platform
spec:
  compositions:
    - path: compositions/terraform/compositions.yaml
  profiles:
    - name: pull-request
      path: profiles/pull-request.yaml
    - name: verify
      path: profiles/verify.yaml
    - name: release
      path: profiles/release.yaml
  triggers:
    - name: github-pull-request
      path: triggers/github-pull-request.yaml
    - name: github-push-main
      path: triggers/github-push-main.yaml
    - name: github-tag-release
      path: triggers/github-tag-release.yaml
  overridePolicy:
    name: default
    path: override-policy.yaml
