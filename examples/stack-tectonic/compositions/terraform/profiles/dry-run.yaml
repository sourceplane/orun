apiVersion: sourceplane.io/v1
kind: ExecutionProfile
metadata:
  name: dry-run
spec:
  description: Plan-only dry run — no init backend, no apply
  plan:
    scope: changed
  controls:
    terraform:
      fmt:
        enabled: true
      init:
        enabled: true
        backend: false
      validate:
        enabled: true
      plan:
        enabled: true
      apply:
        enabled: false
