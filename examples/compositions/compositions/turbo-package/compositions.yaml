apiVersion: sourceplane.io/v1alpha1
kind: Composition
metadata:
  name: turbo-package
spec:
  type: turbo-package
  description: Verify a shared package in a pnpm and Turbo monorepo
  defaultJob: verify-turbo-package
  defaultProfile: verify
  inputSchema:
    $schema: http://json-schema.org/draft-07/schema#
    title: Turbo Package Component
    description: Schema for shared package components validated through pnpm and Turbo
    type: object
    required:
      - name
      - type
      - inputs
    properties:
      name:
        type: string
        description: Component name
      type:
        type: string
        const: turbo-package
        description: Component type identifier
      inputs:
        type: object
        required:
          - nodeVersion
          - pnpmVersion
        properties:
          nodeVersion:
            type: string
            description: Node.js version
          pnpmVersion:
            type: string
            description: pnpm version
          preBuildCommand:
            type: string
            description: Optional command to run before the build (e.g. codegen, schema generation)
          buildCommand:
            type: string
            description: Override the default turbo build command
          typecheckCommand:
            type: string
            description: Override the default turbo typecheck command
        additionalProperties: false
    additionalProperties: true
  executionProfiles:
    quick-check:
      description: Verify package structure without build or typecheck
      jobs:
        verify-turbo-package:
          stepsEnabled:
            - setup-node
            - setup-pnpm
            - install-workspace-dependencies
            - verify-package-structure
    verify:
      description: Full build and typecheck
      jobs:
        verify-turbo-package:
          stepsEnabled:
            - setup-node
            - setup-pnpm
            - install-workspace-dependencies
            - pre-build
            - verify-package-structure
            - build-package
            - typecheck-package
  jobs:
    - name: verify-turbo-package
      description: Install the workspace and validate a shared package
      runsOn: ubuntu-22.04
      timeout: 25m
      retries: 0
      labels:
        scope: verify
      steps:
        - id: setup-node
          name: setup-node
          use: actions/setup-node@v4
          with:
            node-version: "{{.nodeVersion}}"
        - id: setup-pnpm
          name: setup-pnpm
          use: pnpm/action-setup@v4
          with:
            version: "{{.pnpmVersion}}"
        - id: install-workspace-dependencies
          name: install-workspace-dependencies
          run: pnpm install --no-frozen-lockfile
          onFailure: stop
        - id: pre-build
          name: pre-build
          shell: bash
          run: |
            {{if .preBuildCommand}}
            {{.preBuildCommand}}
            {{else}}
            echo "Skipping pre-build."
            {{end}}
          onFailure: stop
        - id: verify-package-structure
          name: verify-package-structure
          run: test -f package.json
          onFailure: stop
        - id: build-package
          name: build-package
          run: "{{if .buildCommand}}{{.buildCommand}}{{else}}pnpm exec turbo run build --filter=./{{end}}"
          onFailure: stop
        - id: typecheck-package
          name: typecheck-package
          run: "{{if .typecheckCommand}}{{.typecheckCommand}}{{else}}pnpm exec turbo run typecheck --filter=./{{end}}"
          onFailure: stop
