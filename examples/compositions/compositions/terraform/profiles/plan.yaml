apiVersion: sourceplane.io/v1
kind: ExecutionProfile
metadata:
  name: plan
spec:
  description: Full validation with plan generation — no apply
  plan:
    scope: changed
  controls:
    terraform:
      fmt:
        enabled: true
      init:
        enabled: true
        backend: true
      validate:
        enabled: true
      plan:
        enabled: true
      apply:
        enabled: false
