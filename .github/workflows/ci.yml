name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go tests
        run: |
          go test ./...
          cd scripts/releaser
          go test ./...

      - name: Run GitHub Actions compatibility tests
        run: go test ./internal/gha -run 'Test(ParseKVFileSupportsHeredocAndBOM|ProcessWorkflowCommandsParsesLegacyCommands|EngineRunStepLocalCompositeActionPropagatesOutputsAndEnv)$'

      - name: Validate provider package build
        uses: sourceplane/kiox-release-action@v2.0.1
        with:
          manifest: provider.yaml
          main: ./cmd/gluon
          output: oci
          dist: dist
          tag: ci

      - name: Smoke test provider with kiox-action
        uses: sourceplane/kiox-action@v2.1.2
        with:
          providers: |
            ${{ github.workspace }}/oci as gluon
          run: |
            kiox --workspace "$KIOX_WORKSPACE_ROOT" provider list
            gluon validate --intent "$GITHUB_WORKSPACE/examples/intent.yaml"
            gluon compositions --config-dir "$GITHUB_WORKSPACE/assets/config/compositions"
            gluon plan \
              --intent "$GITHUB_WORKSPACE/examples/intent.yaml" \
              --config-dir "$GITHUB_WORKSPACE/assets/config/compositions" \
              --output "$RUNNER_TEMP/gluon-plan.json"
            test -s "$RUNNER_TEMP/gluon-plan.json"