apiVersion: sourceplane.io/v1alpha1
kind: Composition
metadata:
  name: terraform
spec:
  type: terraform
  description: Terraform lifecycle composition with fmt, init, validate, plan, and apply
  defaultJob: terraform-lifecycle
  defaultProfile: pull-request
  inputSchema:
    $schema: http://json-schema.org/draft-07/schema#
    title: Terraform Component
    type: object
    required:
      - name
      - type
      - inputs
    properties:
      name:
        type: string
      type:
        type: string
        const: terraform
      inputs:
        type: object
        required:
          - stackName
          - terraformDir
        properties:
          stackName:
            type: string
          terraformDir:
            type: string
          terraformVersion:
            type: string
        additionalProperties: false
    additionalProperties: true
  controlSchema:
    $schema: http://json-schema.org/draft-07/schema#
    title: Terraform Execution Controls
    type: object
    properties:
      fmt:
        type: object
        properties:
          enabled:
            type: boolean
      init:
        type: object
        properties:
          enabled:
            type: boolean
          backend:
            type: boolean
      validate:
        type: object
        properties:
          enabled:
            type: boolean
      plan:
        type: object
        properties:
          enabled:
            type: boolean
      apply:
        type: object
        properties:
          enabled:
            type: boolean
    additionalProperties: false
  controlDefaults:
    fmt:
      enabled: true
    init:
      enabled: true
      backend: true
    validate:
      enabled: true
    plan:
      enabled: true
    apply:
      enabled: false
  jobs:
    - name: terraform-lifecycle
      description: Full Terraform lifecycle job
      runsOn: ubuntu-22.04
      timeout: 30m
      retries: 0
      capabilities:
        - terraform.fmt
        - terraform.init
        - terraform.validate
        - terraform.plan
        - terraform.apply
      steps:
        - id: setup-terraform
          name: setup-terraform
          use: hashicorp/setup-terraform@v4
          with:
            terraform_version: "{{.terraformVersion}}"
            terraform_wrapper: "false"
        - name: terraform-fmt
          when: "{{(index .controls \"fmt\").enabled}}"
          run: terraform fmt -check {{.terraformDir}}
          onFailure: stop
        - name: terraform-init
          when: "{{(index .controls \"init\").enabled}}"
          run: terraform -chdir={{.terraformDir}} init -backend={{(index .controls "init").backend}} -input=false
          onFailure: stop
        - name: terraform-validate
          when: "{{(index .controls \"validate\").enabled}}"
          run: terraform -chdir={{.terraformDir}} validate -no-color
          onFailure: stop
        - name: terraform-plan
          when: "{{(index .controls \"plan\").enabled}}"
          run: terraform -chdir={{.terraformDir}} plan -no-color -input=false
          onFailure: stop
        - name: terraform-apply
          when: "{{(index .controls \"apply\").enabled}}"
          run: terraform -chdir={{.terraformDir}} apply -auto-approve -no-color -input=false
          onFailure: stop
