$schema: http://json-schema.org/draft-07/schema#
title: gluon Composition
description: Self-describing composition contract
 type: object
required:
  - apiVersion
  - kind
  - metadata
  - spec
properties:
  apiVersion:
    type: string
  kind:
    type: string
    enum:
      - Composition
  metadata:
    type: object
    required:
      - name
    properties:
      name:
        type: string
        minLength: 1
      description:
        type: string
      labels:
        type: object
        additionalProperties:
          type: string
  spec:
    type: object
    required:
      - type
      - defaultJob
      - inputSchema
      - jobs
    properties:
      type:
        type: string
        minLength: 1
      description:
        type: string
      defaultJob:
        type: string
        minLength: 1
      inputSchema:
        type: object
      jobs:
        type: array
        minItems: 1
        items:
          type: object
          required:
            - name
          properties:
            name:
              type: string
              minLength: 1
            description:
              type: string
            runsOn:
              type: string
            timeout:
              type: string
            retries:
              type: integer
              minimum: 0
            labels:
              type: object
              additionalProperties:
                type: string
            steps:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  phase:
                    type: string
                  order:
                    type: integer
                  run:
                    type: string
                  use:
                    type: string
                  shell:
                    type: string
                  working-directory:
                    type: string
                  timeout:
                    type: string
                  retry:
                    type: integer
                  onFailure:
                    type: string
                  with:
                    type: object
                    additionalProperties: true
                  env:
                    type: object
                    additionalProperties: true
