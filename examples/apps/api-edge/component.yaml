apiVersion: sourceplane.io/v1
kind: Component

metadata:
  name: api-edge-worker

spec:
  type: cloudflare-worker-turbo
  domain: platform-runtime
  subscribe:
    environments:
      - name: dev
        profile: pull-request
      - name: staging
        profile: verify
      - name: production
        profile: deploy
  inputs:
    nodeVersion: "20"
    pnpmVersion: "10.12.1"
    productionBranch: main
  labels:
    team: platform
    layer: runtime
    surface: api
    runtime: cloudflare