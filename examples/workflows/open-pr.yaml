apiVersion: torkflow/v1
kind: Workflow
metadata:
  name: open-pr
# A workflow used as a blueprint postInstantiate hook (Surface B): after a
# scaffold is written and gated, commit the tree and open a PR. The
# "ensure the repo exists" precondition folds in as the workflow's own
# idempotent first action — there is no pre-placement hook to host it.
spec:
  steps:
    - name: Ensure_repo
      actionRef: github.getOrCreateRepo   # idempotent: get-or-create
      connection: github-app
      parameters:
        org: "{{ Trigger.org }}"
        name: "{{ Trigger.serviceName }}"
      outboundEdges:
        - nextStepName: Open_pr
    - name: Open_pr
      actionRef: github.createPullRequest
      connection: github-app
      parameters:
        repo: "{{ Steps.Ensure_repo.full_name }}"
        head: "{{ Trigger.branch }}"
        base: main
        title: "Scaffold {{ Trigger.serviceName }}"
        body: "Generated by orun new."
