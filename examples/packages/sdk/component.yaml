apiVersion: sourceplane.io/v1
kind: Component

metadata:
  name: platform-sdk

spec:
  type: turbo-package
  domain: platform-packages
  subscribe:
    environments:
      - name: dev
        profile: quick-check
      - name: development
        profile: quick-check
      - name: staging
        profile: verify
      - name: production
        profile: verify
  inputs:
    nodeVersion: "20"
    pnpmVersion: "10.12.1"
  labels:
    team: platform
    layer: shared
    surface: sdk
    runtime: node