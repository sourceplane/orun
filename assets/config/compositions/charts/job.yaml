apiVersion: sourceplane.io/v1
kind: JobRegistry
metadata:
  name: charts-jobs
  description: Helm charts packaging and publishing jobs
jobs:
  - name: package
    description: Package chart definitions
    runsOn: ubuntu-22.04
    timeout: 5m
    retries: 1
    labels:
      scope: packaging
    steps:
      - name: lint
        phase: main
        order: 10
        run: helm lint {{.parameters.registry}}/charts
        timeout: 5m
        onFailure: stop
      - name: package
        phase: main
        order: 20
        run: helm package {{.parameters.registry}}/charts -d dist/
        timeout: 5m
        onFailure: stop
    inputs:
      pullPolicy: Always

  - name: publish
    description: Publish charts to registry
    runsOn: ubuntu-22.04
    timeout: 10m
    retries: 2
    labels:
      scope: publishing
    steps:
      - name: lint
        phase: main
        order: 10
        run: helm lint {{.parameters.registry}}/charts
        timeout: 5m
        onFailure: stop
      - name: package
        phase: main
        order: 20
        run: helm package {{.parameters.registry}}/charts -d dist/
        timeout: 5m
        onFailure: stop
      - name: push
        phase: main
        order: 30
        run: helm push dist/*.tgz oci://{{.parameters.registry}}/helm/charts
        timeout: 5m
        retry: 2
        onFailure: stop
      - name: verify
        phase: post
        order: 10
        run: helm search repo oci://{{.parameters.registry}}/helm/charts
        onFailure: continue
    inputs:
      pullPolicy: Always
      registry: oci://mycompany.azurecr.io

  - name: test
    description: Test chart templates and values
    runsOn: ubuntu-22.04
    timeout: 5m
    retries: 1
    labels:
      scope: testing
    steps:
      - name: lint
        phase: main
        order: 10
        run: helm lint {{.parameters.registry}}/charts --strict
        timeout: 5m
        onFailure: stop
      - name: template-dry-run
        phase: main
        order: 20
        run: helm template test {{.parameters.registry}}/charts --validate
        timeout: 5m
        onFailure: stop
    inputs:
      pullPolicy: Always
