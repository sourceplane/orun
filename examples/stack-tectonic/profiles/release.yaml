apiVersion: sourceplane.io/v1
kind: ExecutionProfile
metadata:
  name: release
spec:
  description: Release-grade execution with apply enabled
  plan:
    scope: full
  controls:
    terraform:
      fmt:
        enabled: true
      init:
        enabled: true
        backend: true
      validate:
        enabled: true
      plan:
        enabled: true
      apply:
        enabled: true
