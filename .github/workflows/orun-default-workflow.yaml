name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  packages: read
  id-token: write   # orun remote-state OIDC authentication
  actions: write    # required for artifact upload

env:
  GITHUB_TOKEN: ${{ github.token }}
  ORUN_BACKEND_URL: https://orun-api.sourceplane.ai
  ORUN_ARTIFACT_BACKEND: github
  ORUN_ARTIFACT_UPLOAD: "true"

jobs:
  plan:
    name: Orun Plan
    runs-on: ubuntu-latest
    outputs:
      job-matrix: ${{ steps.plan.outputs.matrix }}
      plan-checksum: ${{ steps.plan.outputs.plan_id }}
      exec-id: ${{ steps.plan.outputs.exec_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build orun from source
        run: go build -o /usr/local/bin/orun ./cmd/orun
      - name: Plan with Orun
        id: plan
        run: |
          orun plan \
            --from-ci github \
            --event-file "$GITHUB_EVENT_PATH" \
            --intent examples/intent.yaml \
            --artifact github \
            --github-output
      - name: Upload plan artifact
        if: steps.plan.outputs.matrix != '' && steps.plan.outputs.matrix != '{"include":[]}'
        uses: actions/upload-artifact@v4
        with:
          name: orun-plan
          path: examples/.orun/plans/
          if-no-files-found: warn
          retention-days: 14

  execute:
    name: "${{ matrix.component }}/${{ matrix.env }}"
    needs: plan
    if: needs.plan.outputs.job-matrix != '' && needs.plan.outputs.job-matrix != '{"include":[]}'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix: ${{ fromJson(needs.plan.outputs.job-matrix) }}
    concurrency:
      group: orun-${{ github.ref }}-${{ matrix.id }}
      cancel-in-progress: false
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      ORUN_EXEC_ID: ${{ needs.plan.outputs.exec-id }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build orun from source
        run: go build -o /usr/local/bin/orun ./cmd/orun
      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: orun-plan
          path: examples/.orun/plans/
      - name: run job steps
        run: |
          orun run '${{ needs.plan.outputs.plan-checksum }}' \
            --runner github-actions \
            --remote-state \
            --job "${{ matrix.id }}" \
            --exec-id "${{ needs.plan.outputs.exec-id }}" \
            --artifact github