apiVersion: sourceplane.io/v1alpha1
kind: Composition
metadata:
  name: cloudflare-worker-turbo
spec:
  type: cloudflare-worker-turbo
  description: Cloudflare Worker with Turborepo build, verify, and deploy pipeline
  version: 2.3.0
  lifecycle: stable

  schemaRef:
    name: cloudflare-worker-turbo-component

  defaultJob: verify-deploy
  defaultProfile: verify

  # Golden-path effects (orun-service-catalog SC8): what running this
  # composition contributes to the catalog. Declarations only — the live plane
  # records what actually happened.
  effects:
    integrations:
      cloudflare:
        product: workers
    provides:
      - default/orun/cloudflare-edge
    scorecards:
      satisfies:
        - has-deploy-pipeline

  jobs:
    - name: verify-deploy
      templateRef:
        name: cloudflare-worker-turbo-verify-deploy

  profiles:
    - name: pull-request
      profileRef:
        name: cloudflare-worker-turbo-pull-request
    - name: verify
      profileRef:
        name: cloudflare-worker-turbo-verify
    - name: deploy
      profileRef:
        name: cloudflare-worker-turbo-deploy
