apiVersion: sourceplane.io/v1
kind: Intent

metadata:
  name: multi-environment-platform
  description: Multi-environment DevOps sample for foundation, identity, and commerce domains
  namespace: default

compositions:
  sources:
    - name: example-platform
      kind: dir
      path: ./compositions

discovery:
  roots:
    - apps/
    - infra/
    - deploy/
    - charts/
    - packages/
    - website/

execution:
  profiles:
    dry-run:
      description: Fast PR validation — non-mutating checks only
      plan:
        scope: changed
      controls:
        terraform:
          fmt:
            enabled: true
          init:
            enabled: true
            backend: false
          validate:
            enabled: true
          plan:
            enabled: false
          apply:
            enabled: false

    verify:
      description: Merge verification with plan generation
      plan:
        scope: changed
      controls:
        terraform:
          fmt:
            enabled: true
          init:
            enabled: true
            backend: true
          validate:
            enabled: true
          plan:
            enabled: true
          apply:
            enabled: false

    release:
      description: Release-grade execution
      plan:
        scope: full
      controls:
        terraform:
          fmt:
            enabled: true
          init:
            enabled: true
            backend: true
          validate:
            enabled: true
          plan:
            enabled: true
          apply:
            enabled: false

automation:
  triggers:
    - name: github-pull-request
      on:
        provider: github
        event: pull_request
        actions:
          - opened
          - synchronize
          - reopened
          - ready_for_review
      plan:
        profile: dry-run

    - name: github-push-main
      on:
        provider: github
        event: push
        branches:
          - main
      plan:
        profile: verify

    - name: github-tag-release
      on:
        provider: github
        event: push
        tags:
          - "v*"
      plan:
        profile: release

environments:
  dev:
    execution:
      profile: dry-run
    defaults:
      namespacePrefix: dev-
    policies:
      requireApproval: "false"

  development:
    execution:
      profile: dry-run
    defaults:
      namespacePrefix: dev-
    policies:
      requireApproval: "false"

  preview:
    execution:
      profile: verify
    defaults:
      namespacePrefix: preview-
    policies:
      requireApproval: "false"

  staging:
    execution:
      profile: verify
    defaults:
      namespacePrefix: stg-
    policies:
      requireApproval: "true"

  production:
    execution:
      profile: release
    defaults:
      namespacePrefix: prod-
    policies:
      requireApproval: "true"
      requireSignedPlan: "true"
      approvalRequiredCapabilities:
        - terraform.apply
        - mutation.infra
