apiVersion: sourceplane.io/v1
kind: Intent
metadata:
  name: remote-state-matrix-demo
  description: |
    Demonstrates distributed GitHub Actions matrix execution via orun-backend remote state.
    A DAG of three components (foundation → api → web) runs across dev and stage environments.

compositions:
  sources:
    - name: smoke-compositions
      kind: dir
      path: ./compositions

execution:
  state:
    mode: remote
    backendUrl: https://orun-api.rahulvarghesepullely.workers.dev
    # workspace declares the enforced tenancy — a Workspace ID (ws_…), a slug, or
    # a legacy org_… id. Prefer the ws_… id: it is short, immutable, and durable
    # across renames, so it is the safe value to commit. It is sent on every
    # remote op — including the credential-free CI OIDC exchange — so the server
    # can enforce claim ⊆ authorized. Declaring it implies strict mode: a
    # non-interactive run that resolves no workspace fails fast. project defaults
    # to the repo and only needs declaring for a rename/monorepo split.
    workspace: ws_3KF9TQ2P   # a slug (acme) or org_… id is also accepted; `org:` is a retained alias
    # requireOrg: true

environments:
  dev:
    parameterDefaults:
      "*":
        cluster: dev-smoke
  stage:
    parameterDefaults:
      "*":
        cluster: stage-smoke

components:
  - name: foundation
    type: terraform
    subscribe:
      environments:
        - dev
        - stage
    parameters:
      module: infra/foundation

  - name: api
    type: helm
    subscribe:
      environments:
        - dev
        - stage
    parameters:
      chart: charts/api
    dependsOn:
      - component: foundation
        condition: success

  - name: web
    type: helm
    subscribe:
      environments:
        - dev
        - stage
    parameters:
      chart: charts/web
    dependsOn:
      - component: api
        condition: success
