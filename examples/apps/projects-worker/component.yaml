apiVersion: sourceplane.io/v1
kind: Component

metadata:
  name: projects-worker

spec:
  type: cloudflare-worker
  domain: platform-projects
  subscribe:
    environments:
      - name: dev
        profile: pull-request
      - name: staging
        profile: verify
      - name: production
        profile: deploy
  inputs:
    installCommand: pnpm install --no-frozen-lockfile
    buildCommand: pnpm exec turbo run build --filter=./
    typecheckCommand: pnpm exec turbo run typecheck --filter=./
    deployCommand: pnpm run deploy
    nodeVersion: "20"
    pnpmVersion: "10.12.1"
    productionBranch: main
  labels:
    team: platform
    layer: runtime
    surface: projects
    runtime: cloudflare