name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  packages: read
  id-token: write   # orun remote-state OIDC authentication
  actions: write    # required for artifact upload

env:
  GITHUB_TOKEN: ${{ github.token }}
  ORUN_BACKEND_URL: https://orun-api.sourceplane.ai
  ORUN_ARTIFACT_BACKEND: github
  ORUN_ARTIFACT_UPLOAD: "true"

jobs:
  plan:
    name: Orun Plan
    runs-on: ubuntu-latest
    outputs:
      job-matrix: ${{ steps.plan.outputs.job-matrix }}
      plan-checksum: ${{ steps.plan.outputs.plan-checksum }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build orun from source
        run: go build -o /usr/local/bin/orun ./cmd/orun
      - name: Plan with Orun
        id: plan
        run: |
          orun plan \
            --from-ci github \
            --event-file "$GITHUB_EVENT_PATH" \
            --intent examples/intent.yaml \
            --artifact github \
            --github-output
          echo "plan-checksum=$(cat $GITHUB_OUTPUT | grep 'plan_id=' | cut -d= -f2)" >> $GITHUB_OUTPUT
          echo "job-matrix=$(cat $GITHUB_OUTPUT | grep 'matrix=' | cut -d= -f2-)" >> $GITHUB_OUTPUT

  execute:
    name: ${{ matrix.job-name }}
    needs: plan
    if: needs.plan.outputs.job-matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        include: ${{ fromJson(needs.plan.outputs.job-matrix) }}
    concurrency:
      group: orun-${{ github.ref }}-${{ matrix.job-id }}
      cancel-in-progress: false
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      ORUN_EXEC_ID: ${{ needs.plan.outputs.plan-checksum }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build orun from source
        run: go build -o /usr/local/bin/orun ./cmd/orun
      - name: run job steps
        run: |
          orun run \
            --plan plan.json \
            --runner github-actions \
            --remote-state \
            --job "${{ matrix.job-id }}" \
            --exec-id "${{ github.run_id }}-${{ github.run_attempt }}" \
            --artifact github