$schema: http://json-schema.org/draft-07/schema#
title: arx Intent
description: Policy-aware deployment intent specification
type: object
required:
  - apiVersion
  - kind
  - metadata
properties:
  apiVersion:
    type: string
    pattern: ^sourceplane\.io/v[0-9]+$
  kind:
    type: string
    enum:
      - Intent
  metadata:
    type: object
    required:
      - name
    properties:
      name:
        type: string
        minLength: 1
        maxLength: 63
        pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
      description:
        type: string
      namespace:
        type: string
        default: default
  discovery:
    type: object
    properties:
      roots:
        type: array
        description: Optional directories to recursively scan for component.yaml files relative to the intent file.
        items:
          type: string
  groups:
    type: object
    additionalProperties:
      type: object
      properties:
        policies:
          type: object
          additionalProperties: true
        defaults:
          type: object
          description: Default properties for components in this group (supports template variables)
          additionalProperties: true
  environments:
    type: object
    additionalProperties:
      type: object
      properties:
        selectors:
          type: object
          properties:
            components:
              type: array
              items:
                type: string
            domains:
              type: array
              items:
                type: string
        defaults:
          type: object
          description: Default properties for components in this environment (supports template variables)
          additionalProperties: true
        policies:
          type: object
          additionalProperties: true
  components:
    type: array
    items:
      type: object
      required:
        - name
        - type
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 63
        type:
          type: string
          minLength: 1
        domain:
          type: string
        enabled:
          type: boolean
          default: true
        path:
          type: string
          description: Working directory path for component execution (highest priority in override hierarchy, supports template variables)
        subscribe:
          type: object
          properties:
            environments:
              type: array
              items:
                type: string
        inputs:
          type: object
          additionalProperties: true
        overrides:
          type: object
          properties:
            steps:
              type: array
              items:
                type: object
                required:
                  - name
                  - run
                properties:
                  name:
                    type: string
                    minLength: 1
                  phase:
                    type: string
                    enum:
                      - pre
                      - main
                      - post
                    default: main
                  order:
                    type: integer
                    minimum: 0
                  run:
                    type: string
                    minLength: 1
                  timeout:
                    type: string
                    pattern: ^[0-9]+(m|h|s)$
                  retry:
                    type: integer
                    minimum: 0
                    maximum: 10
                  onFailure:
                    type: string
                    enum:
                      - stop
                      - continue
        labels:
          type: object
          additionalProperties:
            type: string
        dependsOn:
          type: array
          items:
            type: object
            required:
              - component
            properties:
              component:
                type: string
              environment:
                type: string
              scope:
                type: string
                enum:
                  - same-environment
                  - cross-environment
              condition:
                type: string
                enum:
                  - success
                  - always
                  - failure
