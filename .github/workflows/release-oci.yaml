name: release-oci

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g. v2.16.0). Created at the dispatched commit if it does not exist yet."
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  RELEASE_TAG: ${{ inputs.version || github.ref_name }}
  IMAGE_REF: ghcr.io/sourceplane/orun:${{ inputs.version || github.ref_name }}

jobs:
  kiox-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure release tag exists (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null; then
            git tag -a "${RELEASE_TAG}" -m "orun ${RELEASE_TAG}" "${GITHUB_SHA}"
          fi
          git push origin "refs/tags/${RELEASE_TAG}" || true

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go tests
        run: go test ./...

      - name: Stamp provider version
        run: |
          sed -i 's/^  version: .*/  version: ${{ env.RELEASE_TAG }}/' provider.yaml

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: sourceplane/kiox-release-action@v2.0.1
        with:
          manifest: provider.yaml
          main: ./cmd/orun
          output: oci
          dist: dist
          tag: ${{ env.RELEASE_TAG }}
          push: ${{ env.IMAGE_REF }}
          kiox-version: v0.4.3
          delegate-goreleaser: true
          goreleaser-config: .goreleaser.yaml

  goreleaser-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure release tag exists (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null; then
            git tag -a "${RELEASE_TAG}" -m "orun ${RELEASE_TAG}" "${GITHUB_SHA}"
          fi
          git push origin "refs/tags/${RELEASE_TAG}" || true

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
