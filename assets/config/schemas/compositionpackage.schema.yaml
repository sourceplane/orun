$schema: http://json-schema.org/draft-07/schema#
title: gluon CompositionPackage
description: Composition package manifest
type: object
required:
  - apiVersion
  - kind
  - metadata
  - spec
properties:
  apiVersion:
    type: string
  kind:
    type: string
    enum:
      - CompositionPackage
  metadata:
    type: object
    required:
      - name
    properties:
      name:
        type: string
        minLength: 1
      description:
        type: string
  spec:
    type: object
    required:
      - version
      - exports
    properties:
      version:
        type: string
      gluon:
        type: object
        properties:
          minVersion:
            type: string
      exports:
        type: array
        minItems: 1
        items:
          type: object
          required:
            - composition
            - path
          properties:
            composition:
              type: string
              minLength: 1
            path:
              type: string
              minLength: 1
      dependencies:
        type: array
        items:
          type: object
          required:
            - name
            - ref
          properties:
            name:
              type: string
            ref:
              type: string
            optional:
              type: boolean
