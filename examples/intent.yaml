apiVersion: sourceplane.io/v1
kind: Intent

metadata:
  name: multi-environment-platform
  description: Multi-environment DevOps sample for foundation, identity, and commerce domains
  namespace: default

compositions:
  sources:
    - name: example-platform
      kind: dir
      path: ./compositions

discovery:
  roots:
    - apps/
    - infra/
    - deploy/
    - charts/
    - packages/
    - website/

environments:
  dev:
    defaults:
      lane: dry-run
      namespacePrefix: dev-
    policies:
      requireApproval: "false"

  development:
    defaults:
      lane: dry-run
      namespacePrefix: dev-
    policies:
      requireApproval: "false"

  preview:
    defaults:
      lane: verify
      namespacePrefix: preview-
    policies:
      requireApproval: "false"

  staging:
    defaults:
      lane: verify
      namespacePrefix: stg-
    policies:
      requireApproval: "true"

  production:
    defaults:
      lane: release
      namespacePrefix: prod-
    policies:
      requireApproval: "true"
