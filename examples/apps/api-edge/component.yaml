apiVersion: sourceplane.io/v1
kind: Component

metadata:
  name: api-edge-worker

spec:
  type: cloudflare-worker-turbo
  domain: platform-runtime
  system: edge-gateway
  lifecycle: production
  integrations:
    datadog:
      service: api-edge-worker
      team: platform-runtime
    pagerduty:
      serviceId: PEDGE01
  links:
    - title: Runbook
      url: https://example.com/runbooks/api-edge
      icon: book
  docs:
    techdocs: docs/
  extensions:
    x-orun-demo:
      tier: gold
  subscribe:
    environments:
      - name: dev
        profile: pull-request
      - name: staging
        profile: verify
      - name: production
        profile: deploy
  parameters:
    nodeVersion: "20"
    pnpmVersion: "10.12.1"
    productionBranch: main
  labels:
    team: platform
    layer: runtime
    surface: api
    runtime: cloudflare