apiVersion: orun.io/v1
kind: Stack
metadata:
  name: tectonic
  title: Tectonic Platform Stack
  version: 1.0.0
  description: Full-lifecycle platform stack with profiles, triggers, and override policy.
  owner: sourceplane
  tags:
    - terraform
    - platform

# Convention-over-configuration: all resources auto-discovered from folder structure.
#
#   compositions/   → compositions.yaml files (recursive)
#   profiles/       → ExecutionProfile documents (*.yaml)
#   triggers/       → TriggerBinding documents (*.yaml)
#   policies/       → StackOverridePolicy documents (*.yaml, first match wins)
#
# To override auto-discovery, declare explicit entries under spec:
#   spec:
#     compositions:
#       - path: compositions/terraform/compositions.yaml
#     profiles:
#       - name: release
#         path: profiles/release.yaml
#     triggers:
#       - name: push-main
#         path: triggers/github-push-main.yaml
#     overridePolicy:
#       name: default
#       path: policies/override-policy.yaml
