apiVersion: sourceplane.io/v1
kind: ExecutionProfile
metadata:
  name: verify
spec:
  description: Merge verification with full backend initialization
  plan:
    scope: changed
  controls:
    terraform:
      fmt:
        enabled: true
      init:
        enabled: true
        backend: true
      validate:
        enabled: true
      plan:
        enabled: true
      apply:
        enabled: false
