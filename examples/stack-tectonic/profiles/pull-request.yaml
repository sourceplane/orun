apiVersion: sourceplane.io/v1
kind: ExecutionProfile
metadata:
  name: pull-request
spec:
  description: Fast PR validation — non-mutating checks only
  plan:
    scope: changed
  controls:
    terraform:
      fmt:
        enabled: true
      init:
        enabled: true
        backend: false
      validate:
        enabled: true
      plan:
        enabled: true
      apply:
        enabled: false
